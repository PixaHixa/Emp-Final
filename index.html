<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>نظام إدارة رواتب الموظفين</title>
  </head>
  <body>
    <div id="root">
      <div
        style="
          min-height: 100vh;
          display: grid;
          place-items: center;
          background: #f8fafc;
          color: #0f172a;
          font-family: system-ui, sans-serif;
          padding: 1rem;
          text-align: center;
        "
      >
        <div>
          <p style="font-size: 1rem; font-weight: 600; margin: 0 0 0.5rem">جارٍ تحميل التطبيق...</p>
          <p style="font-size: 0.875rem; margin: 0; opacity: 0.8">
            إذا بقيت هذه الرسالة، فتأكد أن JavaScript مفعّل في المتصفح ثم حدّث الصفحة.
          </p>
        </div>
      </div>
    </div>
    <noscript>
      <div style="padding: 1rem; text-align: center; font-family: system-ui, sans-serif">
        JavaScript is disabled. Please enable JavaScript and refresh.
      </div>
    </noscript>
    <script>
      window.__inlineJsWorks = true
    </script>
    <script type="module">
      import('/src/main.tsx').catch((error) => {
        const root = document.getElementById('root')
        if (!root) return
        const msg = error instanceof Error ? `${error.name}: ${error.message}` : String(error)
        root.innerHTML = `
          <div style="min-height:100vh;display:grid;place-items:center;background:#f8fafc;color:#0f172a;font-family:system-ui,sans-serif;padding:1rem;">
            <div style="max-width:56rem;width:100%;text-align:left;direction:ltr;">
              <h1 style="margin:0 0 .75rem;font-size:1.125rem;">Module load failed</h1>
              <pre style="margin:0;white-space:pre-wrap;overflow-wrap:anywhere;background:#fff;border:1px solid #e2e8f0;border-radius:.75rem;padding:.75rem;">${msg}</pre>
            </div>
          </div>
        `
      })
    </script>
  </body>
</html>
